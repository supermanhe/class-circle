[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

[[redirects]]
from = "/api/posts"
to = "/.netlify/functions/posts"
status = 200

[[redirects]]
from = "/api/posts/:id/like"
to = "/.netlify/functions/like-post?id=:id"
status = 200

[[redirects]]
from = "/api/uploads/signature"
to = "/.netlify/functions/upload-signature"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
